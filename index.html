<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="메디프론트(MEDIFRONT) - 병원 성장의 모든 것. 마케팅 운영대행부터 경영 컨설팅, 개원 브랜딩, AI 데이터 솔루션까지. 원장님의 든든한 병원 컨설팅 파트너."
    />
    <meta name="theme-color" content="#072e2b" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="메디프론트 MEDIFRONT" />
    <meta property="og:locale" content="ko_KR" />
    <meta property="og:title" content="메디프론트 | 병원 컨설팅 파트너" />
    <meta
      property="og:description"
      content="데이터와 AI로 증명하는 병원 성장. 전국 원장님들이 선택한 병원 컨설팅 파트너, 메디프론트."
    />
    <!-- ⚠️ SNS 공유 미리보기 이미지: og:image / og:url 은 반드시 배포된 실제 도메인(절대 URL)이어야 합니다.
         이미지 교체 시 ?v= 숫자를 올려 SNS 캐시를 갱신하세요. -->
    <meta property="og:url" content="https://medifront.co.kr/" />
    <meta property="og:image" content="https://medifront.co.kr/og-image.png?v=3" />
    <meta property="og:image:secure_url" content="https://medifront.co.kr/og-image.png?v=3" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="메디프론트 - 원장님의 든든한 병·의원 컨설팅 파트너" />

    <!-- Twitter / X 카드 -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="메디프론트 | 병원 컨설팅 파트너" />
    <meta
      name="twitter:description"
      content="데이터와 AI로 증명하는 병원 성장. 전국 원장님들이 선택한 병원 컨설팅 파트너, 메디프론트."
    />
    <meta name="twitter:image" content="https://medifront.co.kr/og-image.png?v=3" />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <!--
      가변 폰트 + 다이나믹 서브셋으로 로드한다.
      - 가변(variable): 굵기 45~920 을 파일 하나가 커버 → 굵기별 파일 6개를 받던 것이 사라진다.
      - 다이나믹 서브셋: 한글 글리프를 92 조각으로 쪼개고 unicode-range 로 선언해,
        브라우저가 페이지에 실제 쓰인 글자의 조각만 내려받는다.
      정적(static) 버전은 굵기 6종 × 780KB = 약 4.7MB 를 전부 받는다. 되돌리지 말 것.
    -->
    <link
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"
      rel="stylesheet"
    />
    <title>메디프론트 MEDIFRONT | 병원 성장의 모든 것, 병원 컨설팅 파트너</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
