AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  메디프론트 서버리스 백엔드 — Cognito(회원 인증) + DynamoDB(데이터) + Lambda/HTTP API.
  배포: scripts/deploy-backend.sh (aws cloudformation package/deploy)

Parameters:
  SiteOrigin:
    Type: String
    Default: https://medifront.co.kr
    Description: CORS 를 허용할 사이트 주소 (쉼표 없이 1개, www 는 자동 포함)

Globals:
  Function:
    Runtime: nodejs22.x
    MemorySize: 256
    Timeout: 15
    Environment:
      Variables:
        TABLE_NAME: !Ref DataTable

Resources:
  # ── 데이터 테이블 (모든 엔티티를 pk/sk 로 저장하는 단일 테이블) ──
  DataTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub '${AWS::StackName}-data'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      # 실수/악의적 테이블 삭제 방지 (지우려면 콘솔에서 명시적으로 해제해야 함)
      DeletionProtectionEnabled: true
      SSESpecification:
        SSEEnabled: true

  # ── 회원 인증 (기존 Supabase Auth 대체) ──
  UserPool:
    Type: AWS::Cognito::UserPool
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      UserPoolName: !Sub '${AWS::StackName}-users'
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      # 개인정보(회원·상담 내역)를 다루므로 최소한의 강도를 강제한다.
      # 대문자·특수문자까지 요구하면 이탈이 커지므로 길이 8 + 영문 + 숫자로 균형을 잡음.
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireNumbers: true
          RequireUppercase: false
          RequireSymbols: false
          TemporaryPasswordValidityDays: 7
      # 유출된 비밀번호 사용 차단 + 비정상 로그인 탐지(Threat Protection).
      # 이 기능은 PLUS 요금제에서만 동작하므로 UserPoolTier 를 함께 지정해야 한다.
      # (ESSENTIALS 로 두면 배포가 400 에러로 실패한다)
      # 비용: MAU 당 약 $0.015(ESSENTIALS) → $0.020(PLUS)
      UserPoolTier: PLUS
      UserPoolAddOns:
        AdvancedSecurityMode: ENFORCED
      Schema:
        - Name: name
          AttributeDataType: String
          Mutable: true
          Required: false
        - Name: phone
          AttributeDataType: String
          Mutable: true
        - Name: grade
          AttributeDataType: String
          Mutable: true
        # 의사면허번호 — 가입자가 입력, 관리자가 확인 후 grade 를 '의사'로 승인.
        # 관리자/본인만 조회 가능(Lambda 인가에서 제한).
        - Name: license_no
          AttributeDataType: String
          Mutable: true
      VerificationMessageTemplate:
        DefaultEmailOption: CONFIRM_WITH_CODE
        EmailSubject: '[메디프론트] 회원가입 인증 코드'
        EmailMessage: >-
          메디프론트 회원가입 인증 코드: {####}
          <br><br>가입 화면의 인증 코드 입력란에 위 6자리 숫자를 입력해 주세요.
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: false
        InviteMessageTemplate:
          EmailSubject: '[메디프론트] 계정 등록 안내'
          EmailMessage: >-
            메디프론트 계정이 등록되었습니다.
            <br>아이디(이메일): {username}
            <br>임시 비밀번호: {####}
            <br><br>https://medifront.co.kr 에서 로그인 후 비밀번호를 변경해 주세요.
      LambdaConfig:
        PostConfirmation: !GetAtt PostConfirmationFunction.Arn

  # ── 관리자 역할 그룹 (최고관리자 / 일반관리자 / 운영자) ──
  # Lambda(backend/src/index.mjs)가 JWT 의 cognito:groups 로 역할을 판정합니다.
  # 세 등급의 권한은 현재 모두 동일하며, 등급별 권한 분리는 index.mjs 의
  # ROLE_BY_GROUP 과 getAuth 가 돌려주는 role 로 분기해 구현하면 됩니다.
  # 한 사람은 항상 한 역할 그룹에만 속합니다(setRoleGroup).
  #
  # 운영자 초대(POST /auth/invite)가 자동으로 그룹에 넣으므로 보통은 수동 작업이
  # 필요 없습니다. 최초 최고관리자만 아래처럼 직접 추가하세요:
  #   aws cognito-idp admin-add-user-to-group \
  #     --user-pool-id <UserPoolId> --username <email> --group-name super-admin
  #
  # Precedence: 낮을수록 상위 (권한 분리 시 우선순위 판정에 사용)
  SuperAdminGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: super-admin
      Description: 최고관리자 — 전체 권한
      Precedence: 1
      UserPoolId: !Ref UserPool

  AdminGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: admin
      Description: 일반관리자 — 회원·상담·운영자 데이터 접근 권한
      Precedence: 2
      UserPoolId: !Ref UserPool

  OperatorGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: operator
      Description: 운영자 — 현재 일반관리자와 동일 권한
      Precedence: 3
      UserPoolId: !Ref UserPool

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: web
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      # ⚠️ 권한 상승 방지 — custom:grade 를 절대 넣지 마세요.
      # 매거진 접근이 grade === '의사' 로 결정되는데, 이 목록에 custom:grade 가
      # 있으면 가입자가 스스로 '의사'를 지정해 면허 확인을 우회할 수 있습니다.
      # 등급은 관리자만 변경합니다(Lambda 의 AdminUpdateUserAttributes).
      WriteAttributes:
        - email
        - name
        - custom:phone
        - custom:license_no
      ReadAttributes:
        - email
        - email_verified
        - name
        - custom:phone
        - custom:grade
        - custom:license_no
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      RefreshTokenValidity: 30
      AccessTokenValidity: 60
      IdTokenValidity: 60
      TokenValidityUnits:
        AccessToken: minutes
        IdToken: minutes
        RefreshToken: days
      PreventUserExistenceErrors: ENABLED

  # ── 가입 완료 시 회원 목록(members)에 자동 등록 (기존 DB 트리거 대체) ──
  PostConfirmationFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-post-confirmation'
      CodeUri: src/
      Handler: index.postConfirmation
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref DataTable

  PostConfirmationPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref PostConfirmationFunction
      Action: lambda:InvokeFunction
      Principal: cognito-idp.amazonaws.com
      SourceArn: !GetAtt UserPool.Arn

  # ── 데이터 API (기존 Supabase 테이블 REST 대체) ──
  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-api'
      CodeUri: src/
      Handler: index.handler
      Environment:
        Variables:
          USER_POOL_ID: !Ref UserPool
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref DataTable
        - Statement:
            - Effect: Allow
              Action:
                - cognito-idp:AdminCreateUser
                - cognito-idp:AdminSetUserPassword
                - cognito-idp:AdminUpdateUserAttributes
                - cognito-idp:AdminGetUser
                # 운영자 초대(/auth/invite) 시 admin 그룹에 넣고,
                # 운영자 삭제 시 그룹에서 빼 관리 권한을 회수하기 위해 필요
                - cognito-idp:AdminAddUserToGroup
                - cognito-idp:AdminRemoveUserFromGroup
              Resource: !GetAtt UserPool.Arn
      Events:
        # 기본: Cognito 로그인 필수 (DefaultAuthorizer 상속)
        Proxy:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /{proxy+}
            Method: ANY
        # ── 공개 경로만 인증 예외 (더 구체적인 라우트가 catch-all 보다 우선함) ──
        # 홈 '성과' 섹션
        PublicPerformances:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /performances
            Method: GET
            Auth:
              Authorizer: NONE
        # 매거진 목록·상세
        PublicArticles:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /articles
            Method: GET
            Auth:
              Authorizer: NONE
        # 무료 상담 신청 (제출만, 열람은 관리자)
        PublicConsultRequests:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /consult-requests
            Method: POST
            Auth:
              Authorizer: NONE
        # 1:1 문의 (비회원 제출 허용, 열람은 관리자)
        PublicInquiries:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /inquiries
            Method: POST
            Auth:
              Authorizer: NONE

  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      # ⚠️ 인증 계층 — 제거하면 API 가 전면 개방됩니다.
      # 공개 경로(위 Auth: NONE)를 제외한 모든 요청은 Cognito ID 토큰이 있어야 합니다.
      Auth:
        Authorizers:
          CognitoAuth:
            IdentitySource: $request.header.Authorization
            JwtConfiguration:
              issuer: !Sub 'https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}'
              audience:
                - !Ref UserPoolClient
        DefaultAuthorizer: CognitoAuth
      # 공개 POST(문의·상담신청)가 무제한 호출되면 스팸·비용 폭탄이 되므로 제한
      DefaultRouteSettings:
        ThrottlingRateLimit: 20 # 평상시 초당 20건
        ThrottlingBurstLimit: 40 # 순간 최대 40건
      CorsConfiguration:
        AllowOrigins:
          # ⚠️ localhost 를 다시 넣지 마세요 — 운영 API 를 로컬 페이지가 호출할 수 있게 됩니다.
          # 로컬 개발은 별도 스택(SiteOrigin 파라미터)으로 배포해 사용하세요.
          - !Ref SiteOrigin
          - https://www.medifront.co.kr
        AllowMethods:
          - GET
          - POST
          - PATCH
          - DELETE
          - OPTIONS
        AllowHeaders:
          - content-type
          # JWT 를 담아 보내려면 반드시 허용해야 함
          - authorization
        MaxAge: 86400

Outputs:
  Region:
    Value: !Ref AWS::Region
  ApiBaseUrl:
    Description: 프론트 VITE_API_BASE_URL 값
    Value: !Sub 'https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com'
  UserPoolId:
    Description: 프론트 VITE_COGNITO_USER_POOL_ID 값
    Value: !Ref UserPool
  UserPoolClientId:
    Description: 프론트 VITE_COGNITO_CLIENT_ID 값
    Value: !Ref UserPoolClient
  TableName:
    Description: 데이터 이전(import-dynamodb.mjs)에 쓰는 TABLE_NAME 값
    Value: !Ref DataTable
