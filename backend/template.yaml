AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  메디프론트 서버리스 백엔드 — Cognito(회원 인증) + DynamoDB(데이터) + Lambda/HTTP API.
  배포: scripts/deploy-backend.sh (aws cloudformation package/deploy)

Parameters:
  SiteOrigin:
    Type: String
    Default: https://medifront.co.kr
    Description: CORS 를 허용할 사이트 주소 (쉼표 없이 1개, www 는 자동 포함)
  # ── 구글 소셜 로그인 (Google Cloud 콘솔 medifront-503000 프로젝트의 OAuth 클라이언트) ──
  GoogleClientId:
    Type: String
    Default: 870816686411-5c17edr04ja0g33bjrb9u6t5nmu391cr.apps.googleusercontent.com
    Description: 구글 OAuth 클라이언트 ID (프론트에도 노출되는 공개 값)
  GoogleClientSecret:
    Type: String
    Default: ''
    NoEcho: true
    Description: >-
      구글 OAuth 클라이언트 보안 비밀. 배포 시 GOOGLE_CLIENT_SECRET 환경변수로 전달한다
      (scripts/deploy-backend.sh). 빈 값이면 구글 IdP 를 만들지 않는다 — 값은 git 에 절대 커밋 금지.
  # ── 네이버 소셜 로그인 (developers.naver.com 애플리케이션) ──
  # 네이버는 Cognito 가 기본 지원하지 않아 Lambda(/auth/naver)가 직접 코드를 교환하고,
  # 커스텀 인증 챌린지로 Cognito 토큰을 발급한다 (index.mjs 의 naverLogin 참고).
  NaverClientId:
    Type: String
    Default: 'q11Zf_W8Qids9GQHdtVx'
    Description: 네이버 애플리케이션 Client ID (프론트에도 노출되는 공개 값)
  NaverClientSecret:
    Type: String
    Default: ''
    NoEcho: true
    Description: >-
      네이버 애플리케이션 Client Secret. 배포 시 NAVER_CLIENT_SECRET 환경변수로 전달한다
      (scripts/deploy-backend.sh). 값은 git 에 절대 커밋 금지.
  # ── 휴대폰 본인인증(실명인증) — 인증사 계약 후 발급받는 키 ──
  # 두 값이 모두 비어 있으면 본인인증 기능이 꺼진 상태로 동작한다(가입은 그대로 진행).
  VerifyApiKey:
    Type: String
    Default: ''
    NoEcho: true
    Description: 본인인증 서비스 API 키. 배포 시 VERIFY_API_KEY 환경변수로 전달.
  VerifyApiSecret:
    Type: String
    Default: ''
    NoEcho: true
    Description: 본인인증 서비스 API 시크릿. 배포 시 VERIFY_API_SECRET 환경변수로 전달.

Conditions:
  HasGoogle: !Not [!Equals [!Ref GoogleClientSecret, '']]

Globals:
  Function:
    Runtime: nodejs22.x
    MemorySize: 256
    Timeout: 15
    Environment:
      Variables:
        TABLE_NAME: !Ref DataTable

Resources:
  # ── 데이터 테이블 (모든 엔티티를 pk/sk 로 저장하는 단일 테이블) ──
  DataTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub '${AWS::StackName}-data'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      # 실수/악의적 테이블 삭제 방지 (지우려면 콘솔에서 명시적으로 해제해야 함)
      DeletionProtectionEnabled: true
      SSESpecification:
        SSEEnabled: true

  # ── 회원 인증 (기존 Supabase Auth 대체) ──
  UserPool:
    Type: AWS::Cognito::UserPool
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      UserPoolName: !Sub '${AWS::StackName}-users'
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      # 개인정보(회원·상담 내역)를 다루므로 최소한의 강도를 강제한다.
      # 대문자·특수문자까지 요구하면 이탈이 커지므로 길이 8 + 영문 + 숫자로 균형을 잡음.
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireNumbers: true
          RequireUppercase: false
          RequireSymbols: false
          TemporaryPasswordValidityDays: 7
      # 발신 이메일을 SES 로 보낸다. Cognito 기본 발송기는 발신자가 no-reply@verificationemail.com
      # 이고 하루 50건 제한 + 스팸함 위험이 있어, no-reply@medifront.co.kr 로 발송한다.
      # ⚠️ DEVELOPER 모드는 SourceArn 의 SES 도메인 identity 가 '검증됨(DKIM SUCCESS)' 상태여야
      #    배포된다. 도메인 인증 전에 배포하면 실패하므로 인증 완료 후 배포할 것.
      EmailConfiguration:
        EmailSendingAccount: DEVELOPER
        SourceArn: !Sub 'arn:aws:ses:${AWS::Region}:${AWS::AccountId}:identity/medifront.co.kr'
        From: 'MEDIFRONT <no-reply@medifront.co.kr>'
      # 유출된 비밀번호 사용 차단 + 비정상 로그인 탐지(Threat Protection).
      # 이 기능은 PLUS 요금제에서만 동작하므로 UserPoolTier 를 함께 지정해야 한다.
      # (ESSENTIALS 로 두면 배포가 400 에러로 실패한다)
      # 비용: MAU 당 약 $0.015(ESSENTIALS) → $0.020(PLUS)
      UserPoolTier: PLUS
      UserPoolAddOns:
        AdvancedSecurityMode: ENFORCED
      Schema:
        - Name: name
          AttributeDataType: String
          Mutable: true
          Required: false
        - Name: phone
          AttributeDataType: String
          Mutable: true
        - Name: grade
          AttributeDataType: String
          Mutable: true
        # 의사면허번호 — 가입자가 입력, 관리자가 확인 후 grade 를 '의사'로 승인.
        # 관리자/본인만 조회 가능(Lambda 인가에서 제한).
        - Name: license_no
          AttributeDataType: String
          Mutable: true
        # 휴대폰 본인인증 티켓 — 가입 화면에서 인증을 마치면 발급되는 1회용 값.
        # postConfirmation 이 이 티켓으로 인증 정보를 확정한 뒤 폐기한다.
        - Name: verify_ticket
          AttributeDataType: String
          Mutable: true
        # 생년월일(YYMMDD) — 의사 회원 신청자의 보건복지부 면허 조회에 필요
        - Name: birth
          AttributeDataType: String
          Mutable: true
      VerificationMessageTemplate:
        DefaultEmailOption: CONFIRM_WITH_CODE
        EmailSubject: '[메디프론트] 회원가입 인증 코드'
        EmailMessage: |
          <!doctype html>
          <html lang="ko">
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1" />
              <meta name="color-scheme" content="light only" />
              <title>메디프론트 회원가입 인증 코드</title>
            </head>
            <body style="margin:0;padding:0;background-color:#f4f6f6;">
              <!-- 미리보기 텍스트(받은편지함 목록에 보이는 요약) -->
              <div style="display:none;max-height:0;overflow:hidden;opacity:0;">메디프론트 회원가입 인증 코드입니다.</div>
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f6f6;">
                <tr>
                  <td align="center" style="padding:32px 16px;">
                    <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="width:600px;max-width:600px;background-color:#ffffff;border-radius:16px;overflow:hidden;box-shadow:0 1px 3px rgba(4,33,31,0.08);">
                      <!-- 헤더 -->
                      <tr>
                        <td align="center" style="background-color:#04211f;padding:28px 32px;">
                          <img src="https://medifront.co.kr/logo-light.png" alt="MEDIFRONT" height="26" style="height:26px;width:auto;display:block;border:0;color:#ffffff;font-size:18px;font-weight:800;" />
                        </td>
                      </tr>
                      <!-- 본문 -->
                      <tr>
                        <td style="padding:40px 40px 8px 40px;font-family:-apple-system,'Apple SD Gothic Neo','Malgun Gothic','맑은 고딕',Roboto,sans-serif;">
                          <h1 style="margin:0 0 12px 0;font-size:20px;line-height:1.4;color:#0b1a18;font-weight:700;">회원가입 인증 코드</h1>
                          <p style="margin:0;font-size:15px;line-height:1.7;color:#33504b;">아래 6자리 인증 코드를 가입 화면의 입력란에 넣어 주세요.</p>
                        </td>
                      </tr>
                      <!-- 코드 박스 -->
                      <tr>
                        <td style="padding:24px 40px 8px 40px;">
                          <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                            <tr>
                              <td align="center" style="background-color:#e7f7f5;border:1px solid #10a696;border-radius:12px;padding:22px 16px;">
                                <div style="font-family:-apple-system,'Apple SD Gothic Neo','Malgun Gothic',monospace;font-size:36px;font-weight:800;letter-spacing:10px;color:#0b6b60;">{####}</div>
                              </td>
                            </tr>
                          </table>
                        </td>
                      </tr>
                      <!-- 안내 -->
                      <tr>
                        <td style="padding:16px 40px 40px 40px;font-family:-apple-system,'Apple SD Gothic Neo','Malgun Gothic','맑은 고딕',Roboto,sans-serif;">
                          <p style="margin:0;font-size:13px;line-height:1.7;color:#5c7871;">본인이 요청하지 않았다면 이 메일을 무시하셔도 됩니다. 인증 코드는 타인에게 알려주지 마세요.</p>
                        </td>
                      </tr>
                      <!-- 푸터 -->
                      <tr>
                        <td style="background-color:#f4f6f6;padding:24px 40px;font-family:-apple-system,'Apple SD Gothic Neo','Malgun Gothic','맑은 고딕',Roboto,sans-serif;border-top:1px solid #e6ebea;">
                          <p style="margin:0 0 4px 0;font-size:13px;font-weight:700;color:#33504b;">메디프론트 MEDIFRONT</p>
                          <p style="margin:0;font-size:12px;line-height:1.6;color:#93aaa4;">병원 성장의 파트너 · <a href="https://medifront.co.kr" style="color:#10a696;text-decoration:none;">medifront.co.kr</a><br />본 메일은 발신 전용입니다.</p>
                        </td>
                      </tr>
                    </table>
                  </td>
                </tr>
              </table>
            </body>
          </html>
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: false
        InviteMessageTemplate:
          EmailSubject: '[메디프론트] 계정 등록 안내'
          EmailMessage: |
            <!doctype html>
            <html lang="ko">
              <head>
                <meta charset="utf-8" />
                <meta name="viewport" content="width=device-width, initial-scale=1" />
                <meta name="color-scheme" content="light only" />
                <title>메디프론트 계정 등록 안내</title>
              </head>
              <body style="margin:0;padding:0;background-color:#f4f6f6;">
                <div style="display:none;max-height:0;overflow:hidden;opacity:0;">메디프론트 계정이 등록되었습니다. 임시 비밀번호로 로그인해 주세요.</div>
                <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f6f6;">
                  <tr>
                    <td align="center" style="padding:32px 16px;">
                      <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="width:600px;max-width:600px;background-color:#ffffff;border-radius:16px;overflow:hidden;box-shadow:0 1px 3px rgba(4,33,31,0.08);">
                        <!-- 헤더 -->
                        <tr>
                          <td align="center" style="background-color:#04211f;padding:28px 32px;">
                            <img src="https://medifront.co.kr/logo-light.png" alt="MEDIFRONT" height="26" style="height:26px;width:auto;display:block;border:0;color:#ffffff;font-size:18px;font-weight:800;" />
                          </td>
                        </tr>
                        <!-- 본문 -->
                        <tr>
                          <td style="padding:40px 40px 8px 40px;font-family:-apple-system,'Apple SD Gothic Neo','Malgun Gothic','맑은 고딕',Roboto,sans-serif;">
                            <h1 style="margin:0 0 12px 0;font-size:20px;line-height:1.4;color:#0b1a18;font-weight:700;">메디프론트 계정이 등록되었습니다</h1>
                            <p style="margin:0;font-size:15px;line-height:1.7;color:#33504b;">관리자가 회원님을 메디프론트 운영자로 등록했습니다. 아래 임시 비밀번호로 로그인한 뒤, 안내에 따라 새 비밀번호를 설정해 주세요.</p>
                          </td>
                        </tr>
                        <!-- 계정 정보 박스 -->
                        <tr>
                          <td style="padding:24px 40px 8px 40px;">
                            <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f8f7;border:1px solid #d9e5e2;border-radius:12px;">
                              <tr>
                                <td style="padding:18px 22px;font-family:-apple-system,'Apple SD Gothic Neo','Malgun Gothic','맑은 고딕',Roboto,sans-serif;">
                                  <p style="margin:0 0 4px 0;font-size:12px;color:#5c7871;">아이디 (이메일)</p>
                                  <p style="margin:0 0 16px 0;font-size:15px;font-weight:600;color:#0b1a18;">{username}</p>
                                  <p style="margin:0 0 4px 0;font-size:12px;color:#5c7871;">임시 비밀번호</p>
                                  <p style="margin:0;font-size:20px;font-weight:800;letter-spacing:2px;color:#0b6b60;font-family:-apple-system,'Apple SD Gothic Neo',monospace;">{####}</p>
                                </td>
                              </tr>
                            </table>
                          </td>
                        </tr>
                        <!-- 버튼 -->
                        <tr>
                          <td align="center" style="padding:28px 40px 16px 40px;">
                            <table role="presentation" cellpadding="0" cellspacing="0">
                              <tr>
                                <td align="center" style="background-color:#10a696;border-radius:10px;">
                                  <a href="https://medifront.co.kr/admin" style="display:inline-block;padding:15px 40px;font-family:-apple-system,'Apple SD Gothic Neo','Malgun Gothic','맑은 고딕',Roboto,sans-serif;font-size:15px;font-weight:700;color:#ffffff;text-decoration:none;">로그인하기</a>
                                </td>
                              </tr>
                            </table>
                          </td>
                        </tr>
                        <!-- 안내 -->
                        <tr>
                          <td style="padding:8px 40px 40px 40px;font-family:-apple-system,'Apple SD Gothic Neo','Malgun Gothic','맑은 고딕',Roboto,sans-serif;">
                            <p style="margin:0;font-size:13px;line-height:1.7;color:#5c7871;">버튼이 열리지 않으면 <a href="https://medifront.co.kr/admin" style="color:#10a696;text-decoration:none;">medifront.co.kr/admin</a> 에 직접 접속해 주세요. 보안을 위해 첫 로그인 시 반드시 새 비밀번호로 변경해 주세요.</p>
                          </td>
                        </tr>
                        <!-- 푸터 -->
                        <tr>
                          <td style="background-color:#f4f6f6;padding:24px 40px;font-family:-apple-system,'Apple SD Gothic Neo','Malgun Gothic','맑은 고딕',Roboto,sans-serif;border-top:1px solid #e6ebea;">
                            <p style="margin:0 0 4px 0;font-size:13px;font-weight:700;color:#33504b;">메디프론트 MEDIFRONT</p>
                            <p style="margin:0;font-size:12px;line-height:1.6;color:#93aaa4;">병원 성장의 파트너 · <a href="https://medifront.co.kr" style="color:#10a696;text-decoration:none;">medifront.co.kr</a><br />본 메일은 발신 전용입니다.</p>
                          </td>
                        </tr>
                      </table>
                    </td>
                  </tr>
                </table>
              </body>
            </html>
      LambdaConfig:
        PostConfirmation: !GetAtt PostConfirmationFunction.Arn
        # 비밀번호 재설정 메일만 전용 문구로 분기 (index.customMessage)
        CustomMessage: !GetAtt CustomMessageFunction.Arn
        # 네이버 로그인 토큰 발급용 커스텀 인증 챌린지 (1회용 코드 검증)
        DefineAuthChallenge: !GetAtt DefineAuthChallengeFunction.Arn
        CreateAuthChallenge: !GetAtt CreateAuthChallengeFunction.Arn
        VerifyAuthChallengeResponse: !GetAtt VerifyAuthChallengeFunction.Arn

  # ── 관리자 역할 그룹 (최고관리자 / 일반관리자 / 운영자) ──
  # Lambda(backend/src/index.mjs)가 JWT 의 cognito:groups 로 역할을 판정합니다.
  # 세 등급의 권한은 현재 모두 동일하며, 등급별 권한 분리는 index.mjs 의
  # ROLE_BY_GROUP 과 getAuth 가 돌려주는 role 로 분기해 구현하면 됩니다.
  # 한 사람은 항상 한 역할 그룹에만 속합니다(setRoleGroup).
  #
  # 운영자 초대(POST /auth/invite)가 자동으로 그룹에 넣으므로 보통은 수동 작업이
  # 필요 없습니다. 최초 최고관리자만 아래처럼 직접 추가하세요:
  #   aws cognito-idp admin-add-user-to-group \
  #     --user-pool-id <UserPoolId> --username <email> --group-name super-admin
  #
  # Precedence: 낮을수록 상위 (권한 분리 시 우선순위 판정에 사용)
  SuperAdminGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: super-admin
      Description: 최고관리자 — 전체 권한
      Precedence: 1
      UserPoolId: !Ref UserPool

  AdminGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: admin
      Description: 일반관리자 — 회원·상담·운영자 데이터 접근 권한
      Precedence: 2
      UserPoolId: !Ref UserPool

  OperatorGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: operator
      Description: 운영자 — 현재 일반관리자와 동일 권한
      Precedence: 3
      UserPoolId: !Ref UserPool

  # ── 소셜 로그인용 Hosted UI 도메인 — 구글 OAuth 리디렉션이 이 주소로 돌아온다.
  # ⚠️ 이름을 바꾸면 Google Cloud 콘솔의 승인된 원본/리디렉션 URI 도 함께 바꿔야 한다.
  UserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: medifront-auth
      UserPoolId: !Ref UserPool

  # 구글 IdP — 시크릿이 전달된 배포에서만 생성/갱신된다 (Conditions.HasGoogle)
  GoogleIdentityProvider:
    Type: AWS::Cognito::UserPoolIdentityProvider
    Condition: HasGoogle
    Properties:
      UserPoolId: !Ref UserPool
      ProviderName: Google
      ProviderType: Google
      ProviderDetails:
        client_id: !Ref GoogleClientId
        client_secret: !Ref GoogleClientSecret
        authorize_scopes: 'openid email profile'
      # 구글 프로필 → Cognito 속성. 등급(custom:grade)은 절대 매핑하지 않는다 —
      # 신규 가입은 항상 '일반'로 시작한다는 원칙(postConfirmation)과 동일.
      AttributeMapping:
        email: email
        email_verified: email_verified
        name: name
        username: sub

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: web
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      # ⚠️ 권한 상승 방지 — custom:grade 를 절대 넣지 마세요.
      # 매거진 접근이 grade === '의사' 로 결정되는데, 이 목록에 custom:grade 가
      # 있으면 가입자가 스스로 '의사'를 지정해 면허 확인을 우회할 수 있습니다.
      # 등급은 관리자만 변경합니다(Lambda 의 AdminUpdateUserAttributes).
      WriteAttributes:
        - email
        - name
        - custom:phone
        - custom:license_no
        # 본인인증 티켓 — 값 자체는 서버가 발급한 1회용이라 위조해도 통과하지 못한다
        - custom:verify_ticket
        - custom:birth
      ReadAttributes:
        - email
        - email_verified
        - name
        - custom:phone
        - custom:grade
        - custom:license_no
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
        # 네이버 로그인 토큰 발급용 커스텀 챌린지 (아래 DefineAuthChallenge~ 트리거).
        # 챌린지 답은 /auth/naver Lambda 만 아는 1회용 코드라 외부에서 악용할 수 없다.
        - ALLOW_CUSTOM_AUTH
      RefreshTokenValidity: 30
      AccessTokenValidity: 60
      IdTokenValidity: 60
      TokenValidityUnits:
        AccessToken: minutes
        IdToken: minutes
        RefreshToken: days
      PreventUserExistenceErrors: ENABLED
      # ── 소셜 로그인 (Hosted UI OAuth code + PKCE — SPA 라 클라이언트 시크릿 없음) ──
      # !Ref GoogleIdentityProvider 는 ProviderName('Google')을 돌려주면서
      # IdP 가 클라이언트보다 먼저 생성되도록 의존성도 만들어 준다.
      SupportedIdentityProviders: !If
        - HasGoogle
        - - COGNITO
          - !Ref GoogleIdentityProvider
        - - COGNITO
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthFlows:
        - code
      AllowedOAuthScopes:
        - openid
        - email
        - profile
      # 콜백은 SPA 루트 — 프론트(authClient.completeOAuthRedirect)가 ?code= 를 처리한다
      CallbackURLs:
        - https://medifront.co.kr/
        - https://www.medifront.co.kr/
        - http://localhost:5173/
      LogoutURLs:
        - https://medifront.co.kr/
        - https://www.medifront.co.kr/
        - http://localhost:5173/

  # ── 가입 완료 시 회원 목록(members)에 자동 등록 (기존 DB 트리거 대체) ──
  PostConfirmationFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-post-confirmation'
      CodeUri: src/
      Handler: index.postConfirmation
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref DataTable

  PostConfirmationPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref PostConfirmationFunction
      Action: lambda:InvokeFunction
      Principal: cognito-idp.amazonaws.com
      SourceArn: !GetAtt UserPool.Arn

  # ── 메일 문구 분기 — 비밀번호 재설정 코드 메일을 전용 문구(같은 공식 디자인)로 ──
  CustomMessageFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-custom-message'
      CodeUri: src/
      Handler: index.customMessage

  CustomMessagePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref CustomMessageFunction
      Action: lambda:InvokeFunction
      Principal: cognito-idp.amazonaws.com
      SourceArn: !GetAtt UserPool.Arn

  # ── 네이버 로그인용 커스텀 인증 챌린지 트리거 3종 ──
  # /auth/naver Lambda 가 DynamoDB 에 심어 둔 1회용 코드를 맞혀야만 토큰이 발급된다.
  # 외부에서 CUSTOM_AUTH 를 시도해도 코드가 없으면(무작위 값으로 대체) 절대 통과할 수 없다.
  DefineAuthChallengeFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-define-auth'
      CodeUri: src/
      Handler: index.defineAuthChallenge

  CreateAuthChallengeFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-create-auth'
      CodeUri: src/
      Handler: index.createAuthChallenge
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref DataTable

  VerifyAuthChallengeFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-verify-auth'
      CodeUri: src/
      Handler: index.verifyAuthChallenge

  DefineAuthChallengePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref DefineAuthChallengeFunction
      Action: lambda:InvokeFunction
      Principal: cognito-idp.amazonaws.com
      SourceArn: !GetAtt UserPool.Arn

  CreateAuthChallengePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref CreateAuthChallengeFunction
      Action: lambda:InvokeFunction
      Principal: cognito-idp.amazonaws.com
      SourceArn: !GetAtt UserPool.Arn

  VerifyAuthChallengePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref VerifyAuthChallengeFunction
      Action: lambda:InvokeFunction
      Principal: cognito-idp.amazonaws.com
      SourceArn: !GetAtt UserPool.Arn

  # ── 데이터 API (기존 Supabase 테이블 REST 대체) ──
  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-api'
      CodeUri: src/
      Handler: index.handler
      Environment:
        Variables:
          USER_POOL_ID: !Ref UserPool
          # 네이버 로그인 — 코드 교환(/auth/naver)과 커스텀 챌린지 토큰 발급에 사용
          CLIENT_ID: !Ref UserPoolClient
          NAVER_CLIENT_ID: !Ref NaverClientId
          NAVER_CLIENT_SECRET: !Ref NaverClientSecret
          # 휴대폰 본인인증 — 비어 있으면 기능이 꺼진 상태로 동작
          VERIFY_API_KEY: !Ref VerifyApiKey
          VERIFY_API_SECRET: !Ref VerifyApiSecret
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref DataTable
        - Statement:
            - Effect: Allow
              Action:
                - cognito-idp:AdminCreateUser
                - cognito-idp:AdminSetUserPassword
                - cognito-idp:AdminUpdateUserAttributes
                - cognito-idp:AdminGetUser
                # 운영자 초대(/auth/invite) 시 admin 그룹에 넣고,
                # 운영자 삭제 시 그룹에서 빼 관리 권한을 회수하기 위해 필요
                - cognito-idp:AdminAddUserToGroup
                - cognito-idp:AdminRemoveUserFromGroup
                # 네이버 로그인 — 커스텀 챌린지로 Cognito 토큰 발급(/auth/naver)
                - cognito-idp:AdminInitiateAuth
                - cognito-idp:AdminRespondToAuthChallenge
              Resource: !GetAtt UserPool.Arn
        # 기존 회원을 운영자로 지정할 때 '운영자 지정' 안내 메일을 SES 로 발송한다.
        # (Cognito 초대 메일과 달리 임의 알림 메일이라 SES 직접 호출이 필요하다)
        - Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
              Resource: '*'
              Condition:
                StringEquals:
                  ses:FromAddress: no-reply@medifront.co.kr
      Events:
        # 기본: Cognito 로그인 필수 (DefaultAuthorizer 상속)
        Proxy:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /{proxy+}
            Method: ANY
        # CORS preflight — OPTIONS 는 인증에서 제외한다.
        # ANY 가 OPTIONS 까지 잡아 authorizer 를 적용하면, 브라우저의 preflight(토큰 없음)가
        # 401 이 되어 Authorization 헤더가 붙는 모든 관리자 요청이 CORS 로 차단된다.
        # 더 구체적인 이 라우트가 ANY 보다 우선하며, Lambda 는 OPTIONS 에 204 를 반환한다.
        CorsPreflight:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /{proxy+}
            Method: OPTIONS
            Auth:
              Authorizer: NONE
        # ── 공개 경로만 인증 예외 (더 구체적인 라우트가 catch-all 보다 우선함) ──
        # 홈 '성과' 섹션
        PublicPerformances:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /performances
            Method: GET
            Auth:
              Authorizer: NONE
        # 매거진 목록·상세
        PublicArticles:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /articles
            Method: GET
            Auth:
              Authorizer: NONE
        # 무료 상담 신청 (제출만, 열람은 관리자)
        PublicConsultRequests:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /consult-requests
            Method: POST
            Auth:
              Authorizer: NONE
        # 1:1 문의 (비회원 제출 허용, 열람은 관리자)
        PublicInquiries:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /inquiries
            Method: POST
            Auth:
              Authorizer: NONE
        # 네이버 로그인 콜백 교환 — 로그인 전 단계라 토큰이 없다.
        # 네이버가 발급한 code 를 검증해야만 토큰이 나가므로 공개해도 안전하다.
        PublicNaverLogin:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /auth/naver
            Method: POST
            Auth:
              Authorizer: NONE
        # 휴대폰 본인인증 — 가입 도중(로그인 전)에 호출되므로 공개.
        # 인증사 서버 조회를 통과해야만 티켓이 발급된다.
        PublicVerifyPhone:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /auth/verify-phone
            Method: POST
            Auth:
              Authorizer: NONE
        # 본인인증 사용 여부 조회 (버튼 노출 판단용)
        PublicVerifyConfig:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /auth/verify-config
            Method: GET
            Auth:
              Authorizer: NONE

  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      # ⚠️ 인증 계층 — 제거하면 API 가 전면 개방됩니다.
      # 공개 경로(위 Auth: NONE)를 제외한 모든 요청은 Cognito ID 토큰이 있어야 합니다.
      Auth:
        Authorizers:
          CognitoAuth:
            IdentitySource: $request.header.Authorization
            JwtConfiguration:
              issuer: !Sub 'https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}'
              audience:
                - !Ref UserPoolClient
        DefaultAuthorizer: CognitoAuth
      # 공개 POST(문의·상담신청)가 무제한 호출되면 스팸·비용 폭탄이 되므로 제한
      DefaultRouteSettings:
        ThrottlingRateLimit: 20 # 평상시 초당 20건
        ThrottlingBurstLimit: 40 # 순간 최대 40건
      CorsConfiguration:
        AllowOrigins:
          # ⚠️ localhost 를 다시 넣지 마세요 — 운영 API 를 로컬 페이지가 호출할 수 있게 됩니다.
          # 로컬 개발은 별도 스택(SiteOrigin 파라미터)으로 배포해 사용하세요.
          - !Ref SiteOrigin
          - https://www.medifront.co.kr
        AllowMethods:
          - GET
          - POST
          - PATCH
          - DELETE
          - OPTIONS
        AllowHeaders:
          - content-type
          # JWT 를 담아 보내려면 반드시 허용해야 함
          - authorization
        MaxAge: 86400

Outputs:
  Region:
    Value: !Ref AWS::Region
  ApiBaseUrl:
    Description: 프론트 VITE_API_BASE_URL 값
    Value: !Sub 'https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com'
  UserPoolId:
    Description: 프론트 VITE_COGNITO_USER_POOL_ID 값
    Value: !Ref UserPool
  UserPoolClientId:
    Description: 프론트 VITE_COGNITO_CLIENT_ID 값
    Value: !Ref UserPoolClient
  TableName:
    Description: 데이터 이전(import-dynamodb.mjs)에 쓰는 TABLE_NAME 값
    Value: !Ref DataTable
